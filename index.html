<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Git Sync</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
      <header class="header" id="titlebar">
        <div class="header-text">
          <h1 class="title">Git Sync</h1>
        </div>
        <div class="window-controls" id="window-controls">
          <button class="win-btn win-min" id="win-min" title="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button class="win-btn win-max" id="win-max" title="Maximize">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect x="2.4" y="2.4" width="5.2" height="5.2" fill="none" stroke="currentColor" stroke-width="1.1" rx="1"/></svg>
          </button>
          <button class="win-btn win-close" id="win-close" title="Close">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2.5" y1="2.5" x2="7.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7.5" y1="2.5" x2="2.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <div class="toolbar">
        <button id="add-project" class="btn btn-primary">+ Add project</button>
        <label class="select-all">
          <input type="checkbox" id="select-all" />
          <span>Select all</span>
        </label>
        <div class="spacer"></div>
        <button id="pull-selected" class="btn btn-pull" disabled>
          Pull selected
        </button>
        <button id="push-selected" class="btn btn-push" disabled>
          Push selected
        </button>
      </div>

      <div id="projects" class="projects">
        <div class="empty">
          <div class="empty-title">Nothing here yet</div>
          <div class="empty-sub">Hit "Add project" to get started</div>
        </div>
      </div>

      <div class="output-wrap" id="output-wrap">
        <div class="output-bar">
          <button class="output-toggle" id="output-toggle" title="Toggle log">
            <svg class="chevron" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5 L5 6.5 L8 3.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Log</span>
          </button>
          <div class="theme-picker-wrap">
            <button class="theme-toggle" id="theme-toggle" title="Change theme">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
              <span>Theme</span>
            </button>
            <div class="theme-swatches" id="theme-swatches"></div>
          </div>
        </div>
        <pre id="output" class="output"></pre>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
