<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Git Sync</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
      <header class="header" id="titlebar">
        <div class="header-text">
          <h1 class="title">Git Sync</h1>
        </div>
        <div class="window-controls" id="window-controls">
          <button class="win-btn win-min" id="win-min" title="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button class="win-btn win-max" id="win-max" title="Maximize">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect x="2.4" y="2.4" width="5.2" height="5.2" fill="none" stroke="currentColor" stroke-width="1.1" rx="1"/></svg>
          </button>
          <button class="win-btn win-close" id="win-close" title="Close">
            <svg width="10" height="10" viewBox="0 0 10 10"><line x1="2.5" y1="2.5" x2="7.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7.5" y1="2.5" x2="2.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <div class="toolbar">
        <button id="add-project" class="btn btn-primary">+ Add project</button>
        <div class="toolbar-spacer"></div>
        <button id="output-toggle" class="btn-select-toggle icon-only" title="Toggle log">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="2" y1="3.5" x2="11" y2="3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="6.5" x2="11" y2="6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="9.5" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <div class="settings-wrap">
          <button id="settings-toggle" class="btn-select-toggle icon-only" title="Settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <div class="settings-panel" id="settings-panel">
            <div class="settings-row">
              <div class="settings-label">Theme</div>
              <div class="theme-swatches" id="theme-swatches"></div>
            </div>
            <div class="settings-row">
              <div class="settings-label">Font</div>
              <div class="font-picker" id="font-picker"></div>
            </div>
            <div class="settings-row">
              <div class="settings-label">Compact</div>
              <button class="toggle-switch" id="compact-toggle" type="button" aria-pressed="false"></button>
            </div>
          </div>
        </div>
        <button id="multi-select-btn" class="btn-select-toggle icon-only" title="Batch select">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="3" x2="12" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><rect x="1" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="10" x2="12" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button id="organize-btn" class="btn-select-toggle icon-only" title="Edit / organize">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9 1.5L11.5 4L5 10.5L1.5 11.5L2.5 8L9 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="collapse-btn" class="btn-select-toggle icon-only" title="Collapse all folders" disabled>
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <g class="icon-collapse"><path d="M3 6L6.5 2.5L10 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 10.5L6.5 7L10 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></g>
            <g class="icon-expand"><path d="M3 2.5L6.5 6L10 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 7L6.5 10.5L10 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></g>
          </svg>
        </button>
      </div>
      <div class="edit-bar" id="edit-bar">
        <button id="add-folder-btn" class="btn btn-primary">+ Folder</button>
      </div>
      <div class="select-bar" id="select-bar">
        <label class="select-all" id="select-all-label">
          <input type="checkbox" id="select-all" />
          <span class="checkbox-box">
            <svg class="checkbox-check" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1.5 4L3.5 6.5L8.5 1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg class="checkbox-dash" width="8" height="2" viewBox="0 0 8 2" fill="none"><line x1="0" y1="1" x2="8" y2="1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          </span>
          <span>All</span>
        </label>
        <div class="spacer"></div>
        <button id="pull-selected" class="btn btn-pull" disabled>Pull</button>
        <button id="push-selected" class="btn btn-push" disabled>Push</button>
        <button id="fetch-selected" class="btn btn-fetch" disabled>Fetch</button>
      </div>

      <div id="projects" class="projects">
        <div class="empty">
          <div class="empty-title">Nothing here yet</div>
          <div class="empty-sub">Hit "Add project" to get started</div>
        </div>
      </div>

      <div class="output-wrap" id="output-wrap">
        <pre id="output" class="output"></pre>
      </div>
    </div>

    <div class="modal-overlay" id="confirm-modal" hidden>
      <div class="modal-card">
        <div class="modal-message" id="modal-message"></div>
        <div class="modal-detail" id="modal-detail"></div>
        <div class="modal-actions">
          <button class="btn modal-cancel" id="modal-cancel">Cancel</button>
          <button class="btn modal-confirm" id="modal-confirm">Remove</button>
        </div>
      </div>
    </div>

    <script type="module" src="renderer.js"></script>
  </body>
</html>
